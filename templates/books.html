<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf — @{{.Config.Username}}</title>
    <meta name="description" content="Bookshelf of {{.Config.Name}} — {{index .Pages.Subtitles "books"}}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate" type="application/atom+xml" title="{{.Config.Name}}'s Blog" href="{{.BaseURL}}/feed.xml">
    <link rel="canonical" href="{{.BaseURL}}/books/">
    <meta property="og:title" content="Bookshelf — @{{.Config.Username}}">
    <meta property="og:description" content="Bookshelf of {{.Config.Name}} — {{index .Pages.Subtitles "books"}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{.BaseURL}}/books/">
    <meta property="og:image" content="{{.BaseURL}}/og-image.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Bookshelf — @{{.Config.Username}}">
    <meta name="twitter:description" content="Bookshelf of {{.Config.Name}} — {{index .Pages.Subtitles "books"}}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Bookshelf — @{{.Config.Username}}",
      "url": "{{.BaseURL}}/books/"
    }
    </script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="/" class="nav-brand">@{{.Config.Username}}</a>
        <input type="checkbox" id="nav-toggle" hidden>
        <label for="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul class="nav-links">
            <li><a href="/resume/">Resume</a></li>
            <li><a href="/projects/">Projects</a></li>
            <li><a href="/blog/">Blog</a></li>
            <li><a href="/now/">Now</a></li>
            <li><a href="/uses/">Uses</a></li>
            <li><a href="/books/">Books</a></li>
        </ul>
    </nav>
    <div class="container">
        <header class="page-header">
            <h1>Bookshelf</h1>
            <p>{{index .Pages.Subtitles "books"}}</p>
        </header>

        <ul class="book-list">
            {{range .Books}}
            <li>
                <span class="book-title">{{.Title}}</span>
                <span class="book-author">{{.Author}}</span>
                {{if .Status}}<span class="book-status">{{.Status}}</span>{{end}}
            </li>
            {{end}}
        </ul>

        <footer>
            <p>&copy; {{.Year}} @{{.Config.Username}}</p>
        </footer>
    </div>
</body>
</html>
