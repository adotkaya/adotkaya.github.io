<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf — @{{.Config.Username}}</title>
    <meta name="description" content="Bookshelf of {{.Config.Name}} — {{index .Pages.Subtitles "books"}}">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="/" class="nav-brand">@{{.Config.Username}}</a>
        <ul class="nav-links">
            <li><a href="/resume/">Resume</a></li>
            <li><a href="/projects/">Projects</a></li>
            <li><a href="/blog/">Blog</a></li>
            <li><a href="/now/">Now</a></li>
            <li><a href="/uses/">Uses</a></li>
            <li><a href="/books/">Books</a></li>
        </ul>
    </nav>
    <div class="container">
        <header class="page-header">
            <h1>Bookshelf</h1>
            <p>{{index .Pages.Subtitles "books"}}</p>
        </header>

        <ul class="book-list">
            {{range .Books}}
            <li>
                <span class="book-title">{{.Title}}</span>
                <span class="book-author">{{.Author}}</span>
                {{if .Status}}<span class="book-status">{{.Status}}</span>{{end}}
            </li>
            {{end}}
        </ul>

        <footer>
            <p>&copy; {{.Year}} @{{.Config.Username}}</p>
        </footer>
    </div>
</body>
</html>
