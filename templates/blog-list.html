<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — @{{.Config.Username}}</title>
    <meta name="description" content="Blog by {{.Config.Name}} — {{index .Pages.Subtitles "blog"}}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate" type="application/atom+xml" title="{{.Config.Name}}'s Blog" href="{{.BaseURL}}/feed.xml">
    <link rel="canonical" href="{{.BaseURL}}/blog/">
    <meta property="og:title" content="Blog — @{{.Config.Username}}">
    <meta property="og:description" content="Blog by {{.Config.Name}} — {{index .Pages.Subtitles "blog"}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{.BaseURL}}/blog/">
    <meta property="og:image" content="{{.BaseURL}}/og-image.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Blog — @{{.Config.Username}}">
    <meta name="twitter:description" content="Blog by {{.Config.Name}} — {{index .Pages.Subtitles "blog"}}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Blog — @{{.Config.Username}}",
      "url": "{{.BaseURL}}/blog/"
    }
    </script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="/" class="nav-brand">@{{.Config.Username}}</a>
        <input type="checkbox" id="nav-toggle" hidden>
        <label for="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul class="nav-links">
            <li><a href="/resume/">Resume</a></li>
            <li><a href="/projects/">Projects</a></li>
            <li><a href="/blog/">Blog</a></li>
            <li><a href="/now/">Now</a></li>
            <li><a href="/uses/">Uses</a></li>
            <li><a href="/books/">Books</a></li>
        </ul>
    </nav>
    <div class="container">
        <header class="page-header">
            <h1>Blog</h1>
            <p>{{index .Pages.Subtitles "blog"}}</p>
        </header>

        <section class="blog-list">
            {{range .Posts}}
            <article class="blog-preview">
                <div class="blog-preview-meta">
                    <time datetime="{{.Date}}">{{.DateFormatted}}</time>
                    <span class="reading-time">{{.ReadingTime}} min read</span>
                </div>
                <h2><a href="{{.URL}}">{{.Title}}</a></h2>
                <p class="blog-excerpt">{{.Excerpt}}</p>
            </article>
            {{end}}
        </section>

        <footer>
            <p>&copy; {{.Year}} @{{.Config.Username}}</p>
        </footer>
    </div>
</body>
</html>
