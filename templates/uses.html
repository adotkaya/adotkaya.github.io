<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uses — @{{.Config.Username}}</title>
    <meta name="description" content="Tools, software, and hardware used by {{.Config.Name}}.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate" type="application/atom+xml" title="{{.Config.Name}}'s Blog" href="{{.BaseURL}}/feed.xml">
    <link rel="canonical" href="{{.BaseURL}}/uses/">
    <meta property="og:title" content="Uses — @{{.Config.Username}}">
    <meta property="og:description" content="Tools, software, and hardware used by {{.Config.Name}}.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{.BaseURL}}/uses/">
    <meta property="og:image" content="{{.BaseURL}}/og-image.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Uses — @{{.Config.Username}}">
    <meta name="twitter:description" content="Tools, software, and hardware used by {{.Config.Name}}.">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Uses — @{{.Config.Username}}",
      "url": "{{.BaseURL}}/uses/"
    }
    </script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="/" class="nav-brand">@{{.Config.Username}}</a>
        <input type="checkbox" id="nav-toggle" hidden>
        <label for="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul class="nav-links">
            <li><a href="/resume/">Resume</a></li>
            <li><a href="/projects/">Projects</a></li>
            <li><a href="/blog/">Blog</a></li>
            <li><a href="/now/">Now</a></li>
            <li><a href="/uses/">Uses</a></li>
            <li><a href="/books/">Books</a></li>
        </ul>
    </nav>
    <div class="container">
        <header class="page-header">
            <h1>Uses</h1>
            <p>{{index .Pages.Subtitles "uses"}}</p>
        </header>

        {{range .Uses.Sections}}
        <section class="uses-section">
            <h2>{{.Title}}</h2>
            <ul class="uses-list">
                {{range .Items}}
                <li>
                    {{if .Label}}<strong>{{.Label}}:</strong> {{end}}{{.Value}}
                </li>
                {{end}}
            </ul>
        </section>
        {{end}}

        <footer>
            <p>&copy; {{.Year}} @{{.Config.Username}}</p>
        </footer>
    </div>
</body>
</html>
